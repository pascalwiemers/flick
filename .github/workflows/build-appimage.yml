name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools and AppImage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ file \
            libgl1-mesa-dev libglib2.0-dev \
            libfontconfig1-dev libfreetype6-dev \
            libx11-dev libx11-xcb-dev libxext-dev libxfixes-dev \
            libxi-dev libxrender-dev libxcb1-dev libxcb-glx0-dev \
            libxcb-keysyms1-dev libxcb-image0-dev libxcb-shm0-dev \
            libxcb-icccm4-dev libxcb-sync-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-xinerama0-dev libxcb-cursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            fuse libfuse2 \
            python3-pip

      - name: Install Qt 6.6.2 via aqtinstall
        run: |
          pip3 install aqtinstall
          aqt install-qt linux desktop 6.6.2 gcc_64
          echo "Qt6_DIR=${{ github.workspace }}/6.6.2/gcc_64" >> $GITHUB_ENV
          echo "${{ github.workspace }}/6.6.2/gcc_64/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/6.6.2/gcc_64/lib" >> $GITHUB_ENV
          echo "QT_PLUGIN_PATH=${{ github.workspace }}/6.6.2/gcc_64/plugins" >> $GITHUB_ENV
          echo "QML2_IMPORT_PATH=${{ github.workspace }}/6.6.2/gcc_64/qml" >> $GITHUB_ENV

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$Qt6_DIR
          cmake --build build --parallel $(nproc)
          strip build/flick

      - name: Install to AppDir
        run: DESTDIR=${{ github.workspace }}/AppDir cmake --install build

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

      - name: Build AppImage
        env:
          QML_SOURCES_PATHS: ${{ github.workspace }}/src/qml
          QMAKE: ${{ github.workspace }}/6.6.2/gcc_64/bin/qmake
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage
          mv Flick-*.AppImage flick-$(git describe --tags --always)-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flick-appimage
          path: flick-*.AppImage

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: flick-*.AppImage
          generate_release_notes: true

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel $(sysctl -n hw.ncpu)
          strip build/flick.app/Contents/MacOS/flick

      - name: Ad-hoc codesign
        run: |
          codesign --force --deep --sign - build/flick.app

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Flick" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "flick.app" 180 190 \
            --app-drop-link 480 190 \
            --hide-extension "flick.app" \
            flick-$(git describe --tags --always)-macos.dmg \
            build/flick.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flick-dmg
          path: flick-*.dmg

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: flick-*.dmg
